name: Sync MD Files and Deploy Jekyll

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - '_fragments/**'
      - '_plugins/**'
      - '_layouts/**'
      - '_config.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置Ruby环境
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          
      - name: 安装依赖
        run: bundle install
        
      - name: 验证插件
        run: |
          echo "=== 插件目录内容 ==="
          ls -la _plugins/
          echo "=== 插件内容 ==="
          cat _plugins/generate_tags.rb || echo "插件文件不存在"
          
      - name: 构建Jekyll网站
        run: |
          echo "=== 开始构建 ==="
          bundle exec jekyll build --trace --verbose
          echo "=== 构建完成 ==="
          
      - name: 验证标签页
        run: |
          echo "=== 生成的标签页 ==="
          find _site/tags -type f
          echo "=== 标签页数量 ==="
          find _site/tags -type f | wc -l
          
      - name: 上传构建结果
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          
      - name: 部署到GitHub Pages
        uses: actions/deploy-pages@v4