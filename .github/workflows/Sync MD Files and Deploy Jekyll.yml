name: Sync MD Files and Deploy Jekyll

on:
  push:
    branches: [main]
    paths:
      - '_posts/zh/**'
      - '_fragments/zh/**'
      - '.github/workflows/sync_and_deploy.yml'
      - 'requirements.txt'
      - '_config.yml'
      - 'zh/**'
      - 'en/**'
      - '.github/scripts/sync_md_files.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ... (保持其他sync-files步骤不变) ...

  build:
    needs: sync-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install
          # 检查生成器文件是否存在
          if [ -f "_plugins/generate_tags.rb" ]; then
            echo "Found generate_tags.rb in _plugins directory"
          elif [ -f "generate_tags.rb" ]; then
            echo "Found generate_tags.rb in root directory"
          else
            echo "Warning: generate_tags.rb not found, creating basic version in _plugins"
            mkdir -p _plugins
            cat << 'EOF' > _plugins/generate_tags.rb
            module Jekyll
              class TagPageGenerator < Generator
                safe true
                def generate(site)
                  all_tags = site.posts.docs.flat_map { |post| post.data['tags'] }.compact.uniq
                  all_tags.each do |tag|
                    site.pages << TagPage.new(site, site.source, tag)
                  end
                end
              end
              class TagPage < Page
                def initialize(site, base, tag)
                  @site = site
                  @base = base
                  @dir = File.join('tags', tag.downcase)
                  @name = 'index.html'
                  self.process(@name)
                  self.read_yaml(File.join(base, '_layouts'), 'tag.html')
                  self.data['tag'] = tag
                  self.data['title'] = "Tag: #{tag}"
                end
              end
            end
            EOF
          fi

      - name: Generate tags
        run: |
          # 尝试在多个可能的位置运行生成器
          if [ -f "_plugins/generate_tags.rb" ]; then
            echo "Running generator from _plugins directory"
            ruby _plugins/generate_tags.rb
          elif [ -f "generate_tags.rb" ]; then
            echo "Running generator from root directory"
            ruby generate_tags.rb
          else
            echo "Running fallback generator from _plugins"
            ruby _plugins/generate_tags.rb
          fi
          
          echo "Generated tag pages:"
          find _site/tags -type f || echo "No tag pages generated"

      - name: Build Jekyll
        run: |
          bundle exec jekyll build --trace
          echo "Final tag pages:"
          find _site/tags -type f | head -n 5 || echo "No tag pages found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4