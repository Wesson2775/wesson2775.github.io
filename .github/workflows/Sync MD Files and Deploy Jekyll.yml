name: Sync MD Files and Deploy Jekyll

on:
  push:
    branches: [main]
    paths:
      - '_posts/zh/**'
      - '_fragments/zh/**'
      - '.github/workflows/sync_and_deploy.yml'
      - 'requirements.txt'
      - '_config.yml'
      - 'zh/**'
      - 'en/**'
      - '.github/scripts/sync_md_files.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Markdown files
        run: |
          python .github/scripts/sync_md_files.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add _posts/en _fragments/en .translation_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync translated English Markdown files and update translation cache [skip ci]"
            git push
          fi

  build:
    needs: sync-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 确保获取完整历史记录

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install
          # 确保生成器文件存在
          if [ ! -f "generate_tags.rb" ]; then
            echo "Error: generate_tags.rb not found!"
            ls -la
            exit 1
          fi

      - name: Generate tags manually
        run: |
          # 打印当前目录结构
          echo "Current directory structure:"
          ls -la
          
          # 确保文件存在
          if [ ! -f "generate_tags.rb" ]; then
            echo "Error: generate_tags.rb not found in $(pwd)"
            exit 1
          fi
          
          # 运行生成器
          echo "Running tag generator..."
          ruby generate_tags.rb
          
          # 验证生成结果
          echo "Generated files:"
          find _site/tags -type f || echo "No tag pages generated"

      - name: Build Jekyll
        run: |
          bundle exec jekyll build --trace
          # 再次验证标签页
          find _site/tags -type f | head -n 5 || echo "No tag pages found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4