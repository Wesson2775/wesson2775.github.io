name: Sync MD Files and Deploy Jekyll

on:
  push:
    branches: [main]
    paths:
      - '_posts/zh/**'
      - '_fragments/zh/**'
      - '.github/workflows/sync_and_deploy.yml'
      - 'requirements.txt'
      - '_config.yml'
      - 'zh/**'
      - 'en/**'
      - '.github/scripts/sync_md_files.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list
          python -c "import yaml; print('PyYAML version:', yaml.__version__)"
          python -c "import git; print('GitPython version:', git.__version__)"
          python -c "import deep_translator; print('deep-translator version:', deep_translator.__version__)"

      - name: Debug file structure
        run: |
          echo "Listing files in _posts/zh and _fragments/zh:"
          find _posts/zh _fragments/zh -type f || echo "No files found"
          echo "Listing files in _posts/en and _fragments/en:"
          find _posts/en _fragments/en -type f || echo "No files found"
          echo "Git status:"
          git status
          echo "Recent commits:"
          git log -n 2 --oneline
          echo "Changed files in last commit:"
          git diff-tree --no-commit-id --name-only -r HEAD^ HEAD

      - name: Sync Markdown files
        run: |
          python .github/scripts/sync_md_files.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify zh and en file correspondence
        run: |
          echo "Verifying _posts/zh and _posts/en correspondence:"
          for zh_file in _posts/zh/*.md; do
            en_file="${zh_file##*/}"
            en_file="_posts/en/${en_file%.md}-en.md"
            if [ -f "$en_file" ]; then
              echo "Match: $zh_file -> $en_file"
            else
              echo "Missing: $en_file for $zh_file"
            fi
          done
          echo "Verifying _fragments/zh and _fragments/en correspondence:"
          for zh_file in _fragments/zh/*.md; do
            en_file="${zh_file##*/}"
            en_file="_fragments/en/${en_file%.md}-en.md"
            if [ -f "$en_file" ]; then
              echo "Match: $zh_file -> $en_file"
            else
              echo "Missing: $en_file for $zh_file"
            fi
          done

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add _posts/en _fragments/en .translation_cache.json
          echo "Staged files:"
          git diff --staged --name-only
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync translated English Markdown files and update translation cache [skip ci]"
            git push
          fi

  build:
    needs: sync-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，便于调试

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'  # 确保与本地一致
          bundler-cache: true  # 缓存 Gem 依赖

      - name: Verify Layout File
        run: |
          if [ -f "_layouts/tag.html" ]; then
            echo "Found tag.html layout"
          else
            echo "Error: _layouts/tag.html not found"
            exit 1
          fi

      - name: Install Dependencies
        run: |
          bundle install
          bundle list  # 输出已安装的 Gem

      - name: Build Jekyll with Custom Plugins
        run: |
          bundle exec jekyll build --verbose  # 详细日志
        env:
          JEKYLL_ENV: production  # 生产环境
          JEKYLL_PLUGINS: _plugins  # 确保加载自定义插件目录

      - name: Debug Generated Tag Pages
        run: |
          echo "Listing generated tag pages:"
          find _site/tags -type f || echo "No tag pages found"
          echo "Checking tag page content:"
          if [ -d "_site/tags" ]; then
            for page in _site/tags/*/index.html; do
              if [ -f "$page" ]; then
                echo "Content of $page:"
                head -n 10 "$page"
              fi
            done
          else
            echo "No tags directory found in _site"
          fi
          echo "Listing all generated files:"
          ls -la _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4