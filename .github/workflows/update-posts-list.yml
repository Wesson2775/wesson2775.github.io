name: Update Posts List

on:
  push:
    branches:
      - main  # 只在 main 分支推送时触发

jobs:
  update-posts-list:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 环境

    steps:
      # 第一步：检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 第二步：生成 posts-list.json
      - name: Generate posts-list.json
        run: |
          cd posts  # 进入 posts 文件夹
          ls *.html > ../posts-list.json  # 列出所有 HTML 文件并保存到 posts-list.json
          cd ..  # 返回根目录
          echo 'Updated posts-list.json:'  # 打印日志
          cat posts-list.json  # 显示 posts-list.json 的内容

      # 第三步：提交并推送 changes
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"  # 设置 Git 用户名
          git config --global user.email "actions@github.com"  # 设置 Git 邮箱
          git add posts-list.json  # 添加 posts-list.json 到暂存区
          git commit -m "Update posts-list.json"  # 提交更改
          git push  # 推送更改到仓库
