name: 更新 posts 数组

on:
  push:
    paths:
      - 'posts/**'
  workflow_dispatch:

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v2

    - name: 列出 posts 文件
      id: list_files
      run: |
        ls posts > post_files.txt

    - name: 更新 scripts.js
      run: |
        files=$(cat post_files.txt | awk '{print "    \x27" $0 "\x27,"}')
        sed -i "/const posts = \[/,/];/c\  const posts = [\n$files\n  ];" scripts.js

    - name: 提交更改
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add scripts.js
        git commit -m '更新 scripts.js 中的 posts 数组'
        git push
