name: 更新文章列表

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v2

    - name: 设置 Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: 安装依赖
      run: npm install markdown-it

    - name: 转换 MD 到 HTML 并更新文章列表
      run: node convert-md-to-html.js