name: Update Posts Array

on:
  push:
    paths:
      - 'posts/**'
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: List post files
      id: list_files
      run: |
        ls posts > post_files.txt

    - name: Update scripts.js
      run: |
        files=$(cat post_files.txt | awk '{print "    \x27" $0 "\x27,"}')
        sed -i '/const posts = \[/,/];/c\  const posts = [\n'"$files"'\n  ];' scripts.js

    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add scripts.js
        git commit -m 'Update posts array in scripts.js'
        git push
