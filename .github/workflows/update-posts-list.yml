name: 更新 posts 数组

on:
  push:
    paths:
      - 'posts/**'
  workflow_dispatch:

jobs:
  update-posts:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.PAT }}

    - name: 列出 posts 文件
      id: list_files
      run: |
        ls posts > post_files.txt

    - name: 生成 posts 数组
      id: generate_array
      run: |
        files=$(cat post_files.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
        echo "posts_array=$files" >> $GITHUB_ENV

    - name: 更新 scripts.js
      run: |
        node -e "
        const fs = require('fs');
        const postsArray = JSON.parse(process.env.posts_array);
        let script = fs.readFileSync('scripts.js', 'utf8');
        script = script.replace(/const posts = \\[.*?\\];/s, 'const posts = ' + JSON.stringify(postsArray, null, 2) + ';');
        fs.writeFileSync('scripts.js', script);
        "

    - name: 提交更改
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}
        git add scripts.js
        git commit -m "更新 scripts.js 中的 posts 数组"
        git push
