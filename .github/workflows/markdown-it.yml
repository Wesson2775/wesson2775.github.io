name: 更新文章列表

on:
  push:
    paths:
      - 'docs/**/*.md'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: 安装依赖
        run: |
          npm init -y
          npm install markdown-it

      - name: 检查目录结构
        run: |
          mkdir -p docs posts
          echo "目录结构："
          tree .

      - name: 转换 MD 到 HTML
        id: convert
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          const md = require("markdown-it")();
          
          const docsDir = path.join(process.cwd(), "docs");
          const postsDir = path.join(process.cwd(), "posts");
          
          // 确保目录存在
          if (!fs.existsSync(docsDir)) fs.mkdirSync(docsDir, { recursive: true });
          if (!fs.existsSync(postsDir)) fs.mkdirSync(postsDir, { recursive: true });
          
          // 获取所有 md 文件
          const files = fs.readdirSync(docsDir).filter(f => f.endsWith(".md"));
          console.log("找到的 Markdown 文件：", files);
          
          let hasChanges = false;
          
          for (const file of files) {
            try {
              const mdPath = path.join(docsDir, file);
              const htmlPath = path.join(postsDir, file.replace(".md", ".html"));
              
              const content = fs.readFileSync(mdPath, "utf8");
              const html = `<!DOCTYPE html>
              <html lang="zh-CN">
                <head>
                  <meta charset="utf-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>${file.replace(".md", "")}</title>
                  <link rel="stylesheet" href="../style.css">
                </head>
                <body>
                  <article>
                    ${md.render(content)}
                  </article>
                  <footer>
                    <p>更新时间：${new Date().toLocaleString("zh-CN")}</p>
                  </footer>
                </body>
              </html>`;
              
              fs.writeFileSync(htmlPath, html.trim());
              console.log(`已生成：${htmlPath}`);
              hasChanges = true;
            } catch (error) {
              console.error(`处理 ${file} 时出错:`, error);
              process.exit(1);
            }
          }
          
          if (hasChanges) {
            fs.writeFileSync(process.env.GITHUB_ENV, `HAS_CHANGES=true`, { flag: "a" });
          }
          '

      - name: 提交更改
        if: env.HAS_CHANGES == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git commit -m "更新：将 Markdown 转换为 HTML"
          git push
