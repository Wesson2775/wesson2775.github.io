name: Markdown 转换为 HTML

# 添加手动触发和文件变化触发
on:
  push:
    paths:
      - 'docs/**/*.md'
  workflow_dispatch:    # 添加这个来支持手动触发
    inputs:            # 可以添加手动触发时的输入参数（可选）
      reason:
        description: '触发原因'
        required: false
        default: '手动更新'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.PAT }}

    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: 安装依赖
      run: |
        npm install markdown-it

    - name: 转换 Markdown 为 HTML
      run: |
        node -e "
          const fs = require('fs');
          const path = require('path');
          const MarkdownIt = require('markdown-it');
          const md = new MarkdownIt();

          if (!fs.existsSync('posts')) {
            fs.mkdirSync('posts');
          }

          const mdFiles = fs.readdirSync('docs')
            .filter(file => file.endsWith('.md'));

          mdFiles.forEach(file => {
            const content = fs.readFileSync(path.join('docs', file), 'utf8');
            const result = md.render(content);
            
            const html = \`<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>\${file.replace('.md', '')}</title>
  <link rel='stylesheet' href='../style.css'>
</head>
<body>
  <div id='blog'>\${file.replace('.md', '')}</div>
  <div id='date'>\${new Date().toISOString().split('T')[0]}</div>
  <article>\${result}</article>
</body>
</html>\`;

            const htmlFile = file.replace('.md', '.html');
            fs.writeFileSync(path.join('posts', htmlFile), html);
          });
        "

    - name: 提交更改
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}
        git add posts/
        git commit -m "将 Markdown 转换为 HTML"
        git push
