<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>如何快速处理大光比图片，保留细节不过曝</title><link rel="stylesheet" href="../style.css"></head><body><div id="blog"><p>针对大光比照片处理的前提是：图片为Raw文件，在没有机会拍摄包围曝光的情况下使用此万能方法拯救照片</p>
<p>-1.拉灰图片，校正偏色
camera raw 中 对比度、高光、白色向左拉到底，阴影和黑色向右拉到底，调整曝光讲波峰调整到画面中间。
调整色温色调校正偏色，使画面颜色处于正常状态。
-2.初步还原灰度，分区微调
讲对比度滑块向右调整去除部分灰色，
分区微调，使用渐变滤镜、径向渐变等工具分区调整画面整体的明暗关系
-3.彻底还原灰度
叠加图床去灰：图层-复制图层-叠加（柔光）-调整填充度，调整色彩，颜色查找，盖印图层，做柔光，稍微拉点s型曲线去灰。</p>
