<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>如何进行胶片调色</title><link rel="stylesheet" href="../style.css"></head><body><div id="blog"><p>调整胶片感照片通常需要使用曲线功能
曲线工具分：明度曲线、RGB曲线。
胶片感照片分析：
照片无高亮和死黑，最亮的颜色为浅灰色，最暗的暗色为深灰色。简称黑白缺失。</p>
<p>在明度曲线上上拉黑点造成黑色缺失，下拉白点造成白色缺失。
单曲线调整法：在黑白缺失的明度曲线上拉出S型曲线。</p>
<p>双曲线调整法：明度曲线 = RGB重合曲线。所以使用明度曲线和RGB曲线实现双曲线调整。</p>
