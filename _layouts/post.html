---
  layout: default
  ---
  <main class="content">
      <article class="post">
          <h1>{{ page.title }}</h1>
          <div class="post-meta">
              <span>{{ page.date | date: "%Y-%m-%d" }}</span>
          </div>
          <div class="post-content">
              {{ content }}
          </div>
      </article>
      <div class="back-button-container">
        <button class="back-button" aria-label="返回上一页" data-lang-key="back">
            <i class="fas fa-arrow-left"></i> <span>返回</span>
        </button>
    </div>
  </main>
