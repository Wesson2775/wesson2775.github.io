---
layout: default
lang: zh
---
<article class="post">
    <header class="post-header">
        <h3>{{ page.title }}</h3>
        <div class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%Y/%m/%d' }}</time>
            {% if page.tags %}
            <div class="post-tags">
                {% for tag in page.tags %}
                <a href="{{ '/tags/' | append: tag | relative_url }}?lang={{ page.lang }}" class="tag">{{ tag }}</a>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </header>
    <div class="post-content">
        {{ content }}
    </div>
    <div class="back-button-container">
        <button class="back-button" aria-label="返回上一页" data-lang-key="back">
            <i class="fas fa-arrow-left"></i> <span>返回</span>
        </button>
    </div>
</article>
