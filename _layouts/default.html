<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css?v=1.4' | relative_url }}">
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/utils.js' | relative_url }}" defer></script>
</head>

<body>
    <div class="main-container">
        <header class="header">
            <div class="header-top">
                <div class="lang">
                    <a href="?lang=zh" class="lang-link" data-lang="zh">ZH</a>
                    <a href="?lang=en" class="lang-link" data-lang="en">EN</a>
                </div>
            </div>
            <div class="header-middle">
                <div class="header-middle-content">
                    <!-- 头像放在左侧 -->
                    <div class="blog-avatar"></div>
                    <!-- 标题和描述 -->
                    <div class="header-text">
                        <a href="{{ '/' | relative_url }}" class="header-title-link">
                            <h1 data-lang-key="title"></h1>
                        </a>
                        <p data-lang-key="description"></p>
                    </div>
                </div>
            </div>
            <div class="header-bottom">
                <nav class="header-bottom-nav nav-menu">
                    <ul>
                        <li><a href="{{ '/' | relative_url }}" data-lang-key="home"><i class="fas fa-home"></i><span class="nav-text">首页</span></a></li>
                        <li><a href="{{ '/fragments' | relative_url }}" data-lang-key="fragments"><i class="fas fa-book"></i><span class="nav-text">随笔</span></a></li>
                        <li><a href="{{ '/friends' | relative_url }}" data-lang-key="friends"><i class="fas fa-users"></i><span class="nav-text">友邻</span></a></li>
                        <li><a href="{{ '/tags' | relative_url }}" data-lang-key="tags"><i class="fas fa-tags"></i><span class="nav-text">标签</span></a></li>
                        <li><a href="{{ '/about' | relative_url }}" data-lang-key="about"><i class="fas fa-info-circle"></i><span class="nav-text">关于</span></a></li>
                    </ul>
                </nav>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="搜索" aria-label="搜索" data-lang-key="search">
                    <i class="fas fa-search search-icon"></i>
                </div>
            </div>
        </header>
        <main class="content">
            {{ content }}
        </main>
        <footer class="footer">
            <p data-lang-key="footer">
                © {{ site.data.site_data.footer.start_year }} - {{ "now" | date: "%Y" }}
                <span data-lang-key="author"></span> · {{ site.data.site_data.footer.license }}
            </p>
            <p>
                <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
            </p>
        </footer>
    </div>
    <button class="floating-nav-btn" aria-label="打开导航菜单" data-lang-key="nav_menu">
        <span class="floating-nav-icon">></span>
    </button>
    <button class="back-to-top" aria-label="返回顶部" data-lang-key="back_to_top">
        <i class="fas fa-arrow-up"></i>
    </button>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 获取语言：优先从 URL 参数获取，若无则从 localStorage 获取，默认为 zh
        const urlParams = new URLSearchParams(window.location.search);
        let currentLang = urlParams.get('lang') || localStorage.getItem('lang') || 'zh';
        currentLang = ['zh', 'en'].includes(currentLang) ? currentLang : 'zh';
        localStorage.setItem('lang', currentLang);

        // 确保 page.lang 与 currentLang 一致
        document.querySelectorAll('html').forEach(html => {
            html.lang = currentLang === 'en' ? 'en' : 'zh-CN';
        });

        // 判断是否为移动端
        const isMobile = () => window.matchMedia('(max-width: 991px)').matches;

        // 更新导航显示
        const updateNavDisplay = () => {
            document.querySelectorAll('.nav-menu a').forEach(link => {
                const key = link.getAttribute('data-lang-key');
                link.innerHTML = isMobile() 
                    ? `<i class="${Utils.iconClasses[key]}"></i>`
                    : `<span class="nav-text">${Utils.translations[currentLang][key]}</span>`;
                link.setAttribute('title', Utils.translations[currentLang][key]);
            });
        };

        // 防抖函数
        const debounce = (func, wait) => {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        };

        // 初始化导航
        setTimeout(updateNavDisplay, 100);
        window.matchMedia('(max-width: 991px)').addEventListener('change', debounce(updateNavDisplay, 200));

        // 更新语言内容
        document.querySelectorAll('[data-lang-key]').forEach(element => {
            const key = element.getAttribute('data-lang-key');
            if (key === 'title') {
                element.textContent = currentLang === 'en' ? '{{ site.title_en }}' : '{{ site.title }}';
            } else if (key === 'description') {
                element.textContent = currentLang === 'en' ? '{{ site.description_en }}' : '{{ site.description }}';
            } else if (key === 'author') {
                element.textContent = currentLang === 'en' ? '{{ site.data.site_data.footer.author_en }}' : '{{ site.data.site_data.footer.author }}';
            } else if (key === 'footer') {
                element.textContent = `© {{ site.data.site_data.footer.start_year }} - {{ "now" | date: "%Y" }} ${currentLang === 'en' ? '{{ site.data.site_data.footer.author_en }}' : '{{ site.data.site_data.footer.author }}'} · {{ site.data.site_data.footer.license }}`;
            } else if (key.startsWith('friend_name_')) {
                const index = parseInt(key.split('_')[2]) - 1;
                const friends = {{ site.data.site_data.friends | jsonify }};
                if (friends && friends[index]) {
                    element.textContent = currentLang === 'en' ? friends[index].name_en : friends[index].name;
                }
            } else if (key.startsWith('friend_desc_')) {
                const index = parseInt(key.split('_')[2]) - 1;
                const friends = {{ site.data.site_data.friends | jsonify }};
                if (friends && friends[index]) {
                    element.textContent = currentLang === 'en' ? friends[index].description_en : friends[index].description;
                }
            } else if (Utils.translations[currentLang][key] && !element.classList.contains('nav-text')) {
                if (element.tagName === 'INPUT') {
                    element.placeholder = Utils.translations[currentLang][key];
                    element.setAttribute('aria-label', Utils.translations[currentLang][key]);
                } else if (element.tagName === 'BUTTON') {
                    element.setAttribute('aria-label', Utils.translations[currentLang][key]);
                } else {
                    element.textContent = Utils.translations[currentLang][key];
                }
            }
        });

        // 更新链接语言参数
        document.querySelectorAll('.nav-menu a, .header-title-link, .lang-link, a[href]:not([href^="http"]):not([href^="#"]):not([href^="mailto"])').forEach(link => {
            const href = link.getAttribute('href');
            if (href && !href.includes('?lang=')) {
                const baseHref = href.split('?')[0];
                link.setAttribute('href', `${baseHref}?lang=${currentLang}`);
            }
        });

        // 语言切换
        document.querySelectorAll('.lang-link').forEach(link => {
            link.classList.toggle('active', link.dataset.lang === currentLang);
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const newLang = link.dataset.lang;
                if (newLang !== currentLang) {
                    localStorage.setItem('lang', newLang);
                    const currentUrl = new URL(window.location.href);
                    currentUrl.searchParams.set('lang', newLang);
                    window.location.href = currentUrl.toString();
                }
            });
        });

        // 返回顶部
        const backToTop = document.querySelector('.back-to-top');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 300);
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 浮动导航按钮
        const floatingNavBtn = document.querySelector('.floating-nav-btn');
        const navMenu = document.querySelector('.nav-menu');
        const floatingNavIcon = document.querySelector('.floating-nav-icon');
        if (floatingNavBtn && navMenu && floatingNavIcon) {
            floatingNavBtn.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                floatingNavBtn.classList.toggle('open');
                floatingNavIcon.textContent = navMenu.classList.contains('active') ? '<' : '>';
            });

            navMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                    floatingNavBtn.classList.remove('open');
                    floatingNavIcon.textContent = '>';
                });
            });

            document.addEventListener('click', (e) => {
                if (!navMenu.contains(e.target) && !floatingNavBtn.contains(e.target)) {
                    navMenu.classList.remove('active');
                    floatingNavBtn.classList.remove('open');
                    floatingNavIcon.textContent = '>';
                }
            });
        }
    });
    </script>
        <!-- 音乐播放器 -->
        <div class="record-player">
            <div class="recorderbackground">
                <div class="record" id="record-toggle">
                    <img class="record-cover" id="record-cover" src="https://via.placeholder.com/30" alt="Cover">
                    <div class="record-grooves"></div>
                </div>
                <div class="tonearm" id="tonearm">
                    <div class="tonearm-needle"></div>
                </div>
            </div>
            <div class="control-panel" id="control-panel">
                <div class="song-info">
                    <div class="song-details">
                        <span class="song-title">未知歌曲</span>
                        <span class="song-artist">未知艺术家</span>
                    </div>
                </div>
                <div class="controls">
                    <button class="control-btn" title="上一曲">⏮</button>
                    <button class="control-btn play-btn" title="播放/暂停">⏵</button>
                    <button class="control-btn" title="下一曲">⏭</button>
                    <div class="volume-container">
                        <span class="volume-icon">🔊</span>
                        <input type="range" class="volume-slider" min="0" max="100" value="80">
                    </div>
                    <button class="control-btn playlist-btn" title="播放列表" id="playlist-toggle">≡</button>
                </div>
                <div class="playlist" id="playlist">
                    <!-- Playlist items will be dynamically added -->
                </div>
            </div>
        </div>
        <audio id="audio-player" style="display: none;"></audio>
    
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const recordToggle = document.getElementById('record-toggle');
                const controlPanel = document.getElementById('control-panel');
                const playBtn = document.querySelector('.play-btn');
                const volumeSlider = document.querySelector('.volume-slider');
                const playlistToggle = document.getElementById('playlist-toggle');
                const playlist = document.getElementById('playlist');
                const recordCover = document.getElementById('record-cover');
                const tonearm = document.getElementById('tonearm');
                const recordPlayer = document.querySelector('.record-player');
                const audioPlayer = document.getElementById('audio-player');
                
                let isPlaying = false;
                let isCollapsed = false;
                let isPlaylistOpen = false;
    
                const songs = [
                    { 
                        title: "it's 6pm but I miss u already", 
                        artist: "BlueLee,Furyl,Siren", 
                        cover: "http://p1.music.126.net/vfArwmf4yUKmZhi-ZCwOXA==/109951166569406479.jpg?param=130y130", 
                        src: "http://music.163.com/song/media/outer/url?id=1890756154.mp3"
                    },
                    { 
                        title: "Gentle Breeze", 
                        artist: "Podington Bear", 
                        cover: "https://via.placeholder.com/30/333?text=Gentle+Breeze", 
                        src: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Podington_Bear/Solo_Instruments/Podington_Bear_-_Gentle_Breeze.mp3"
                    },
                    { 
                        title: "Soft Echoes", 
                        artist: "Podington Bear", 
                        cover: "https://via.placeholder.com/30/333?text=Soft+Echoes", 
                        src: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Podington_Bear/Solo_Instruments/Podington_Bear_-_Soft_Echoes.mp3"
                    },
                    { 
                        title: "Morning Dew", 
                        artist: "Podington Bear", 
                        cover: "https://via.placeholder.com/30/333?text=Morning+Dew", 
                        src: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Podington_Bear/Solo_Instruments/Podington_Bear_-_Morning_Dew.mp3"
                    },
                    { 
                        title: "Quiet Waves", 
                        artist: "Podington Bear", 
                        cover: "https://via.placeholder.com/30/333?text=Quiet+Waves", 
                        src: "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Podington_Bear/Solo_Instruments/Podington_Bear_-_Quiet_Waves.mp3"
                    }
                ];
                
                let currentSongIndex = 0;
    
                // Initialize audio player
                audioPlayer.src = songs[currentSongIndex].src;
                audioPlayer.volume = volumeSlider.value / 100;
    
                // Initialize playlist
                function initializePlaylist() {
                    playlist.innerHTML = '';
                    songs.forEach((song, index) => {
                        const item = document.createElement('div');
                        item.className = 'playlist-item';
                        item.innerHTML = `
                            <div class="song-details">
                                <span class="playlist-title">${song.title}</span>
                                <span class="playlist-artist">${song.artist}</span>
                            </div>
                        `;
                        item.addEventListener('click', () => {
                            currentSongIndex = index;
                            updateSongInfo();
                            isPlaying = true;
                            playBtn.textContent = '⏸';
                            recordToggle.classList.add('playing');
                            tonearm.classList.add('playing');
                            audioPlayer.src = songs[currentSongIndex].src;
                            audioPlayer.play();
                            togglePlaylist();
                        });
                        playlist.appendChild(item);
                    });
                }
    
                // Update song information
                function updateSongInfo() {
                    const song = songs[currentSongIndex];
                    document.querySelector('.song-details').innerHTML = `
                        <span class="song-title">${song.title}</span>
                        <span class="song-artist">${song.artist}</span>
                    `;
                    recordCover.src = song.cover;
                }
    
                // Update playlist view
                function updatePlaylistView() {
                    if (isPlaylistOpen) {
                        controlPanel.classList.add('playlist-mode');
                        const topSongIndex = currentSongIndex;
                        const bottomSongIndex = (currentSongIndex + 1) % songs.length;
                        
                        // Update top half (song-info)
                        document.querySelector('.song-details').innerHTML = `
                            <span class="song-title">${songs[topSongIndex].title}</span>
                            <span class="song-artist">${songs[topSongIndex].artist}</span>
                        `;
    
                        // Update bottom half (controls)
                        const controls = document.querySelector('.controls');
                        controls.innerHTML = `
                            <div class="song-details" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                <span class="playlist-title" style="font-size: 10px;">${songs[bottomSongIndex].title}</span>
                                <span class="playlist-artist" style="font-size: 10px;">${songs[bottomSongIndex].artist}</span>
                            </div>
                        `;
                    } else {
                        controlPanel.classList.remove('playlist-mode');
                        // Restore controls
                        document.querySelector('.controls').innerHTML = `
                            <button class="control-btn" title="上一曲">⏮</button>
                            <button class="control-btn play-btn" title="播放/暂停">${isPlaying ? '⏸' : '⏵'}</button>
                            <button class="control-btn" title="下一曲">⏭</button>
                            <div class="volume-container">
                                <span class="volume-icon">🔊</span>
                                <input type="range" class="volume-slider" min="0" max="100" value="${volumeSlider.value}">
                            </div>
                            <button class="control-btn playlist-btn" title="播放列表" id="playlist-toggle">≡</button>
                        `;
                        // Reattach event listeners
                        document.querySelector('.play-btn').addEventListener('click', togglePlay);
                        document.querySelectorAll('.control-btn').forEach(btn => {
                            if (btn.textContent === '⏮') {
                                btn.addEventListener('click', previousSong);
                            } else if (btn.textContent === '⏭') {
                                btn.addEventListener('click', nextSong);
                            }
                        });
                        document.getElementById('playlist-toggle').addEventListener('click', togglePlaylist);
                        document.querySelector('.volume-slider').addEventListener('input', handleVolume);
                        updateSongInfo();
                    }
                }
    
                // Toggle playlist visibility
                function togglePlaylist() {
                    isPlaylistOpen = !isPlaylistOpen;
                    playlist.classList.toggle('open', isPlaylistOpen);
                    updatePlaylistView();
                }
    
                // Play/pause toggle
                function togglePlay() {
                    isPlaying = !isPlaying;
                    playBtn.textContent = isPlaying ? '⏸' : '⏵';
                    if (isPlaying) {
                        recordToggle.classList.add('playing');
                        tonearm.classList.add('playing');
                        audioPlayer.play();
                    } else {
                        recordToggle.classList.remove('playing');
                        tonearm.classList.remove('playing');
                        audioPlayer.pause();
                    }
                }
    
                // Previous song
                function previousSong() {
                    currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
                    updateSongInfo();
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    recordToggle.classList.add('playing');
                    tonearm.classList.add('playing');
                    audioPlayer.src = songs[currentSongIndex].src;
                    audioPlayer.play();
                }
    
                // Next song
                function nextSong() {
                    currentSongIndex = (currentSongIndex + 1) % songs.length;
                    updateSongInfo();
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                    recordToggle.classList.add('playing');
                    tonearm.classList.add('playing');
                    audioPlayer.src = songs[currentSongIndex].src;
                    audioPlayer.play();
                }
    
                // Volume control
                function handleVolume() {
                    audioPlayer.volume = this.value / 100;
                }
    
                // Auto-play next song when current song ends
                audioPlayer.addEventListener('ended', function() {
                    nextSong();
                });
    
                // Toggle record player expand/collapse
                recordToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    toggleCollapse();
                });
    
                function toggleCollapse() {
                    const player = document.querySelector('.record-player');
                    player.classList.toggle('collapsed');
                    isCollapsed = !isCollapsed;
                    
                    if (isCollapsed) {
                        if (isPlaylistOpen) togglePlaylist();
                        if (isPlaying) {
                            recordToggle.classList.add('playing');
                            tonearm.classList.add('playing');
                        }
                    } else {
                        if (isPlaying) {
                            recordToggle.classList.add('playing');
                            tonearm.classList.add('playing');
                        }
                    }
                }
    
                // Click outside to collapse
                document.addEventListener('click', function(e) {
                    if (!recordPlayer.contains(e.target) && !isCollapsed) {
                        toggleCollapse();
                    }
                });
    
                // Prevent clicks inside record player from collapsing
                recordPlayer.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
    
                // Play/pause button
                playBtn.addEventListener('click', togglePlay);
    
                // Volume control
                volumeSlider.addEventListener('input', handleVolume);
    
                // Previous/next buttons
                document.querySelectorAll('.control-btn').forEach(btn => {
                    if (btn.textContent === '⏮') {
                        btn.addEventListener('click', previousSong);
                    } else if (btn.textContent === '⏭') {
                        btn.addEventListener('click', nextSong);
                    }
                });
    
                // Playlist toggle
                playlistToggle.addEventListener('click', togglePlaylist);
    
                // Initialize
                initializePlaylist();
                updateSongInfo();
            });
        </script>
</body>
</html>
