<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <title>{{ page.title }}</title>
    <style>
        /* 胶囊样式音乐播放器 */
        #music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            max-width: 90%;
            z-index: 100;
        }
        
        /* 胶囊主体 */
        .player-capsule {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 10px;
            display: flex;
            align-items: center;
            border: 1px solid #eee;
        }
        
        /* 歌曲头像 */
        .song-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 10px;
            flex-shrink: 0;
            background: #f0f0f0;
            overflow: hidden;
        }
        
        .song-avatar img {
            width: 100%;
            height: 100%;
        }
        
        /* 控制按钮区域 */
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }
        
        .control-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f5f5f5;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: #e0e0e0;
            color: #333;
        }
        
        .play-btn {
            background: #4a6fa5;
            color: white;
        }
        
        .play-btn:hover {
            background: #3a5a8f;
        }
        
        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            margin-left: auto;
        }
        
        .volume-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 16px;
            padding: 5px;
        }
        
        /* 歌曲列表 */
        .song-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: white;
            border-radius: 0 0 15px 15px;
            margin-top: -5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .song-list.show {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .song-item {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .song-item:hover {
            background: #f9f9f9;
        }
        
        .song-item-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 10px;
        }
        
        .song-item-info {
            flex-grow: 1;
        }
        
        .song-item-title {
            font-size: 14px;
            margin: 0;
        }
        
        .song-item-artist {
            font-size: 12px;
            color: #888;
            margin: 0;
        }
        
        /* 列表切换按钮 */
        .toggle-list {
            text-align: center;
            padding: 5px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- 原有页面结构保持不变 -->
    <div class="main">
        <!-- 原有内容 -->
    </div>

    <!-- 胶囊样式音乐播放器 -->
    <div id="music-player">
        <div class="player-capsule">
            <!-- 歌曲头像 -->
            <div class="song-avatar" id="current-cover">
                <img src="" alt="封面">
            </div>
            
            <!-- 控制按钮 -->
            <div class="controls">
                <button class="control-btn" id="prev-btn">⏮</button>
                <button class="control-btn play-btn" id="play-btn">▶</button>
                <button class="control-btn" id="next-btn">⏭</button>
                
                <!-- 音量控制 -->
                <div class="volume-control">
                    <button class="volume-btn" id="vol-down-btn">🔉</button>
                    <button class="volume-btn" id="vol-up-btn">🔊</button>
                </div>
            </div>
        </div>
        
        <!-- 歌曲列表 -->
        <div class="toggle-list" id="toggle-list-btn">显示歌单 ▼</div>
        <div class="song-list" id="song-list"></div>
    </div>

    <script src="/scripts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    <script>
        // 音乐列表
        const musicList = [
            {
                name: "雨后清晨",
                artist: "Pixabay",
                url: "https://cdn.pixabay.com/audio/2022/08/23/audio_0d33d5ea0f.mp3",
                cover: "https://cdn.pixabay.com/audio/2022/08/04/audio_0b5d1bc71e.jpg"
            },
            {
                name: "宁静时光",
                artist: "Pixabay",
                url: "https://cdn.pixabay.com/audio/2022/03/23/audio_d16713dc14.mp3",
                cover: "https://cdn.pixabay.com/audio/2022/03/15/15-39-31-355_200x200.jpg"
            },
            {
                name: "夏日微风",
                artist: "Bensound",
                url: "https://www.bensound.com/bensound-music/bensound-summer.mp3",
                cover: "https://www.bensound.com/bensound-img/summer.jpg"
            }
        ];

        // 初始化播放器
        const ap = new APlayer({
            container: document.getElementById('music-player'),
            audio: musicList,
            fixed: true,
            mini: false,
            autoplay: false,
            loop: 'all',
            order: 'list',
            volume: 0.7,
            mutex: true,
            lrcType: 0,
            listFolded: true
        });

        // 自定义UI控制
        function setupCustomUI() {
            const player = document.getElementById('music-player');
            
            // 隐藏默认APlayer UI
            player.querySelector('.aplayer-body').style.display = 'none';
            
            // 初始化当前歌曲封面
            updateCurrentCover();
            
            // 绑定按钮事件
            document.getElementById('prev-btn').addEventListener('click', () => ap.skipBack());
            document.getElementById('next-btn').addEventListener('click', () => ap.skipForward());
            document.getElementById('play-btn').addEventListener('click', () => {
                ap.toggle();
                updatePlayButton();
            });
            
            // 音量控制
            document.getElementById('vol-down-btn').addEventListener('click', () => {
                ap.volume(ap.audio.volume - 0.1);
            });
            
            document.getElementById('vol-up-btn').addEventListener('click', () => {
                ap.volume(ap.audio.volume + 0.1);
            });
            
            // 歌单切换
            const toggleBtn = document.getElementById('toggle-list-btn');
            const songList = document.getElementById('song-list');
            
            toggleBtn.addEventListener('click', () => {
                songList.classList.toggle('show');
                toggleBtn.textContent = songList.classList.contains('show') ? '隐藏歌单 ▲' : '显示歌单 ▼';
            });
            
            // 填充歌曲列表
            renderSongList();
            
            // 监听歌曲切换
            ap.on('listswitch', (index) => {
                updateCurrentCover();
                updatePlayButton();
            });
            
            // 播放状态变化
            ap.on('play', updatePlayButton);
            ap.on('pause', updatePlayButton);
            
            // 错误处理
            ap.on('error', () => {
                console.log('播放错误，自动跳过');
                setTimeout(() => ap.skipForward(), 2000);
            });
        }
        
        // 更新当前歌曲封面
        function updateCurrentCover() {
            const coverImg = document.querySelector('#current-cover img');
            coverImg.src = ap.list.audios[ap.list.index].cover || 'https://via.placeholder.com/40';
        }
        
        // 更新播放按钮状态
        function updatePlayButton() {
            const btn = document.getElementById('play-btn');
            btn.textContent = ap.audio.paused ? '▶' : '⏸';
        }
        
        // 渲染歌曲列表
        function renderSongList() {
            const listContainer = document.getElementById('song-list');
            listContainer.innerHTML = '';
            
            ap.list.audios.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'song-item';
                item.innerHTML = `
                    <img class="song-item-avatar" src="${song.cover || 'https://via.placeholder.com/30'}" alt="封面">
                    <div class="song-item-info">
                        <p class="song-item-title">${song.name}</p>
                        <p class="song-item-artist">${song.artist}</p>
                    </div>
                `;
                
                item.addEventListener('click', () => {
                    ap.list.switch(index);
                    ap.play();
                    document.getElementById('song-list').classList.remove('show');
                    document.getElementById('toggle-list-btn').textContent = '显示歌单 ▼';
                });
                
                listContainer.appendChild(item);
            });
        }

        // 播放器准备好后设置UI
        ap.on('loadeddata', setupCustomUI);
    </script>
</body>
</html>
