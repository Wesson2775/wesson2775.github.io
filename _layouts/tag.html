---
layout: default
---
<div class="article">
    <h3 data-lang-key="tag_title">标签：{{ page.tag }}</h3>
    <ul id="posts-list">
        <!-- Content will be loaded dynamically by JavaScript -->
    </ul>
</div>
<div class="page-nav">
    <ul id="pagination"></ul>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const currentPage = parseInt(urlParams.get('page')) || 1;
    const perPage = 5;
    const lang = localStorage.getItem('lang') || 'zh';
    const currentTag = decodeURIComponent('{{ page.tag }}');
    const displayTag = Utils.tagTranslations[lang][currentTag] || currentTag;

    document.querySelector('[data-lang-key="tag_title"]').textContent = `${Utils.translations[lang].tag_title}: ${displayTag}`;

    fetch('{{ "/posts.json" | relative_url }}')
        .then(response => {
            if (!response.ok) throw new Error(`Failed to load posts data, status: ${response.status}`);
            return response.json();
        })
        .then(posts => {
            const filteredPosts = posts.filter(post => post.lang === lang && post.tags?.includes(currentTag));
            const totalPages = Math.ceil(filteredPosts.length / perPage);
            const paginatedPosts = filteredPosts.slice((currentPage - 1) * perPage, currentPage * perPage);

            const postsList = document.getElementById('posts-list');
            postsList.innerHTML = paginatedPosts.length > 0
                ? paginatedPosts.map(post => `
                    <li>
                        <div class="article-data">
                            <div class="article-data-date">
                                <p>${post.date}</p>
                            </div>
                            <div class="article-data-tag">
                                ${post.tags?.map(tag =>
                    `<a href="{{ "/tags/" | relative_url }}${encodeURIComponent(tag)}?lang=${lang}" 
                                    class="tag-link"
                                    style="margin-left: 8px;">${Utils.tagTranslations[lang][tag] || tag}</a>`
                ).join('') || ''
                    }
                            </div>
                        </div>
                        <div class="article-content">
                            <a href="${post.url}?lang=${lang}">
                                <h3>${post.title}</h3>
                            </a>
                            <p>${post.content?.substring(0, 150) || ''}...</p>
                        </div>
                    </li>
                `).join('')
                : `<li><p class="no-results">${lang === 'en' ? 'No posts found for this tag.' : '未找到该标签的文章。'}</p></li>`;

            const pagination = document.getElementById('pagination');
            pagination.innerHTML = Utils.generatePagination(totalPages, currentPage, lang);
        })
        .catch(() => {
            document.getElementById('posts-list').innerHTML = `<li><p class="no-results">${lang === 'en' ? 'Failed to load posts.' : '加载文章失败。'}</p></li>`;
        });
});
</script>
